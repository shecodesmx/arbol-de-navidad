<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Árbol de Navidad 3D</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="arbol-container" id="arbol"></div>

    <div class="interfaz">
        <h2 class="titulo">🎄 Árbol Navideño</h2>
        <button class="boton" onclick="cambiarTema()">🎨 Tema</button>
        <button class="boton" onclick="sincronizarLuces()">💡 Luces</button>
        <button class="boton" onclick="lanzarConfeti()">🎉 Confeti</button>
        
        <div class="contador">
            <span>💡 <span id="luces">0</span></span>
            <span>🎁 <span id="regalos">0</span></span>
        </div>
    </div>

    <div class="mensaje" id="mensaje">¡Feliz Navidad! 🎄✨</div>

    <script src="script.js"></script>
</body>
</html>
